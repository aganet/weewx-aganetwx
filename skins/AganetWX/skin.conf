# AganetWX skin configuration. WeeWX 5.x, multi-language, metric, ECharts.
#
# DO NOT EDIT THIS FILE TO CONFIGURE YOUR STATION. An extension update
# (weectl extension install) OVERWRITES skin.conf, so any change here is lost
# on the next upgrade. Put your settings in weewx.conf instead, under
# [StdReport] [[AganetWXReport]] [[[Extras]]] (mirroring the structure below).
# weewx.conf is never touched by updates and its values override these defaults.
# Example:
#   [StdReport]
#     [[AganetWXReport]]
#       [[[Extras]]]
#         [[[[theme]]]]
#           mode = dark
#           hero_dynamic_color = true
# The values below are DEFAULTS only.

SKIN_NAME = AganetWX
SKIN_VERSION = 1.8.12

# Skin options, exposed to templates as $Extras.*. Override any of these
# per-report in weewx.conf under [[AganetWXReport]] [[[Extras]]] (see the note
# at the top of this file). Editing them here works but is lost on upgrade.
[Extras]

    # NOTE: display language is the report-level `lang =` setting (loads
    # lang/<code>.conf), NOT an Extras key. See [[AganetWXReport]] in weewx.conf.

    # In-page language switcher. List 2+ codes to embed those languages'
    # dictionaries and show a switcher; the visitor's browser language is
    # picked on first visit and their choice is remembered. Labels swap
    # instantly client-side, no page reload, no duplicated output. `lang`
    # (above) stays the server-rendered default/fallback. Leave empty or with a
    # single code for a fixed single-language site.
    languages = en, el, es, fr, de, it, pt

    # Auto-discovered extra sensors panel (extraTemp*, soil, leaf, AQI,
    # lightning, battery, ...). Set false to hide it entirely.
    extra_sensors = true

    # Limit which sensor GROUPS appear in that panel, in this order. Empty shows
    # all discovered groups (the default). Group keys: temp, humidity, soil,
    # leaf, air, lightning, other, status. Example: extra_sensor_groups = temp
    extra_sensor_groups =

    # Choose which series the Temperature chart draws, in order. Empty uses the
    # default (outTemp, dewpoint, appTemp, heatindex, windchill). List built-in
    # names and/or your own extra temperature sensors to compare them, e.g.
    # temp_chart_series = outTemp, extraTemp2   (outside air vs a soil probe).
    temp_chart_series =

    # Hero card: big current temperature, feels-like, today's range. Current page.
    hero = true

    # "Today in one sentence": a plain-language summary of today (condition,
    # high, gusts, rain) built from this station's own data. Current page.
    summary = true

    # "Compare" card (Current page): today vs yesterday (same time of day), this
    # month's rain vs the same month in prior years, and this date last year, all
    # from your own archive. Richer with more history. Off by default.
    compare = false

    # "Compare" PAGE: a full interactive page (own nav tab) that overlays a
    # chosen metric across every year in your archive, day-by-day for a chosen
    # month. Off by default. The whole-archive aggregation is cached on disk and
    # rebuilt only when older than compare_refresh seconds (default once a day),
    # so it adds no real cost to a report cycle even on a large archive.
    compare_page = false
    compare_refresh = 86400

    # Monthly all-time records tables on the History page (needs compare_page):
    # hottest/coldest per calendar month, and wettest/average monthly rain, from
    # the whole archive. Uses the same cached aggregation, so no extra cost. Off
    # by default. records_temp / records_rain toggle each table independently.
    monthly_records = false
    records_temp = true
    records_rain = true

    # Sun & Moon celestial card (moon phase, rise/set). Set false to hide.
    celestial = true

    # Amateur-station disclaimer bar under the nav (also shown on About).
    # Set false to hide. The wording is the "Disclaimer" key in lang/*.conf.
    disclaimer = true

    # Show today's high/low (with time) beside each current value (Current page).
    rows_show_range = true

    # Auto-reload the page to follow new data. "auto" uses the station archive
    # interval (+60s); or set a number of seconds, or "off" to disable.
    auto_refresh = auto

    # Show a warning banner when the latest observation is older than this many
    # seconds (the station may be offline). Checked in the visitor's browser
    # using an absolute timestamp, so it is timezone-independent. 0 disables it.
    stale_alert_secs = 3600

    # Timezone used to label chart times, as an IANA name (e.g. Europe/Athens).
    # Charts show the STATION's local time for every visitor, so a viewer in
    # another timezone still sees times that match "Latest update". Leave empty
    # to auto-detect from the server ($TZ, then /etc/localtime, /etc/timezone);
    # set it explicitly if auto-detection is wrong or the charts are off by the
    # offset between the station and the viewer.
    chart_tz =

    # Ham-radio HF propagation card (solar flux, A/K index, band conditions),
    # fetched server-side from HamQSL (N0NBH) each report cycle so the page stays
    # self-contained. Off by default. The reading is cached on disk and only
    # re-fetched when older than solar_refresh seconds (HamQSL updates about
    # hourly), so most report cycles add no delay. solar_timeout caps the fetch.
    solar = false
    solar_refresh = 3600
    solar_timeout = 15

    [[theme]]
        # Visual layout:
        #   modern  = flat blue card-tile dashboard (default)
        #   classic = warm, compact label/value rows
        layout = modern
        # light | dark | auto  (auto follows the visitor's OS preference)
        mode = light
        # Header dropdown to switch between Modern, Classic, and Dark presets.
        # The visitor's choice is remembered (localStorage). Set false to hide it
        # and pin the layout/mode above.
        switcher = true
        # Tint the current-conditions hero by temperature instead of the flat
        # accent: ice-blue when freezing, a solid blue through the comfortable
        # range, then amber, orange and deep red as it heats up. Set false for
        # the plain accent hero.
        hero_dynamic_color = true
        # Weather-mood face + short caption in the hero, changing across six
        # bands (Brrr! / Chilly / Crisp / Perfect / Sweating / Melting!).
        hero_mood = true
        # Header/box gradient (warm cream-gold by default; used by the classic layout).
        gradient_top = "#FDDA74"
        gradient_bottom = "#FFFDCA"
        page_bg = "#FFFDCA"
        # Accent used for chart titles, links, headings.
        accent = "#0a5ca8"
        # Body font stack.
        font = "system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        base_font_size = "9.5pt"
        # comfortable | compact  (compact tightens row heights & padding)
        density = comfortable
        # Dark-mode palette (used when mode=dark, or mode=auto + dark OS).
        dark_bg = "#16202b"
        dark_panel = "#1f2c3a"
        dark_ink = "#e6edf3"
        dark_gradient_top = "#243447"
        dark_gradient_bottom = "#1a2531"

    [[branding]]
        # Show the lat/long/altitude line in the footer.
        show_footer_coords = true
        # Optional extra link in the footer (leave url empty to hide).
        link_url = ""
        link_text = ""

    [[about]]
        # About page content. Software versions are read automatically; the
        # fields below add your own prose/contact. Leave a field empty to omit
        # its line. Prose supports inline HTML. For rich prose that survives
        # upgrades, drop an about.inc next to the template (see
        # about.inc.example); it replaces the prose below.
        # Hardware label: WeeWX may only report "Vantage" if the console is not
        # attached at report time. Set the exact model here to be sure.
        hardware = ""
        prose_en = "This station monitors the weather at Kamena Vourla, Greece."
        prose_el = "Ο σταθμός καταγράφει τον καιρό στα Καμένα Βούρλα."
        operator = "George Anestopoulos"
        email = ""
        website_url = "https://aganet.gr"
        website_text = "aganet.gr"
        # Show exact coordinates and the map link. Set false for privacy.
        show_coordinates = true

    # All-time records card (Current page): highest/lowest values ever recorded
    # in your archive, with the date each happened. Set false to hide.
    records = true

    [[alerts]]
        # Threshold highlighting on the Current page: when a live value crosses a
        # limit, its row is highlighted (red above `high`, blue below `low`).
        # Limits are in your displayed units. The defaults below suit a warm
        # Mediterranean/Greek coastal climate; tune or remove them for yours
        # (e.g. a colder site may want a lower `outTemp low`). Delete a whole
        # subsection to stop highlighting that value.
        [[[outTemp]]]
            high = 38          # heatwave (degC)
            low = 2            # near freezing (degC)
        [[[appTemp]]]
            high = 40          # dangerous "feels like"
        [[[windSpeed]]]
            high = 50          # strong wind (km/h)
        [[[outHumidity]]]
            high = 90          # very humid
            low = 20           # very dry
        [[[rainRate]]]
            high = 40          # heavy downpour (mm/h)
        [[[UV]]]
            high = 8           # very high UV

    [[webcam]]
        # Webcam banner shown above the navigation, aligned to the content
        # width. Off by default. `url` is an image path (relative to the site,
        # e.g. cam.jpg) or a full URL. With `auto_refresh = true` the image is
        # reloaded client-side every `refresh` seconds with a cache-busting
        # query so it never goes stale, and a live countdown badge is shown;
        # set auto_refresh = false for a static image (loaded once, no badge).
        # `link` (optional) makes the image clickable (e.g. a full-size still or
        # stream). Size and position: `max_width` caps the image width in pixels
        # (empty = full content width); `height` caps the display height; `align`
        # places a narrower image left, center, or right.
        enable = false
        url = "cam.jpg"
        auto_refresh = true
        refresh = 30
        title = ""
        link = ""
        max_width = ""
        height = 380
        align = center

    [[links]]
        # "Useful Links" card at the bottom of the left column. Set show = false
        # to hide it. Add/edit/remove entries freely: each [[[entry]]] needs a
        # url and text. Order here is the display order. Defaults point at
        # Greece-wide maps; change them for your region.
        show = true
        [[[lightning]]]
            text = "Lightning map (Greece)"
            url = "https://www.lightningmaps.org/?lang=en#m=oss;t=3;s=0;o=0;b=;ts=0;y=39.0;x=22.5;z=6"
        [[[windy]]]
            text = "Windy (Greece)"
            url = "https://www.windy.com/?39.000,22.500,6"
        [[[satellite]]]
            text = "Satellite clouds (Greece)"
            url = "https://en.sat24.com/en/gr"

    [[nav]]
        # Which tabs appear in the top navigation.
        current = true
        yesterday = true
        week = true
        month = true
        year = true
        lastyear = true
        archive = true
        about = true

    [[charts]]
        # Which charts render (each also auto-hides if its sensor has no data).
        temp = true
        humidity = true
        pressure = true
        windspeed = true
        windvec = true
        windvector = true
        windrose = true
        rain = true
        rainrate = true
        uv = true
        radiation = true
        et = true
        cloudbase = true

    [[rows]]
        # Which rows appear in the Current Values box.
        humidity = true
        dewpoint = true
        wind = true
        barometer = true
        rain_today = true
        rain_rate = true
        rain_month = true
        rain_year = true
        last_rain = true
        et = true
        windchill = true
        heatindex = true
        apptemp = true
        uv = true
        radiation = true

# CheetahGenerator: each [[section]] is a template; output file is its name minus ".tmpl".
[CheetahGenerator]

    # The default encoding for generated files.
    encoding = html_entities

    # Sensor-agnostic extras: discovers extra/soil/leaf/AQI/lightning/battery
    # observations the station records and exposes them as $extra_groups.
    search_list_extensions = user.aganetwx_extras.AganetWXExtras, user.aganetwx_extras.AganetWXI18n, user.aganetwx_extras.AganetWXSolar, user.aganetwx_extras.AganetWXCompare, user.aganetwx_extras.AganetWXCompareData

    [[ToDate]]
        # Templates that contain "to-date" data (current conditions + history).

        [[[index]]]
            template = index.html.tmpl
        [[[yesterday]]]
            template = yesterday.html.tmpl
        [[[week]]]
            template = week.html.tmpl
        [[[month]]]
            template = month.html.tmpl
        [[[year]]]
            template = year.html.tmpl
        [[[lastyear]]]
            template = lastyear.html.tmpl
        [[[archive]]]
            template = archive.html.tmpl
        [[[about]]]
            template = about.html.tmpl
        [[[compare]]]
            template = compare.html.tmpl

        [[[json_day]]]
            template = data/day.json.tmpl
            encoding = utf8
        [[[json_yesterday]]]
            template = data/yesterday.json.tmpl
            encoding = utf8
        [[[json_week]]]
            template = data/week.json.tmpl
            encoding = utf8
        [[[json_month]]]
            template = data/month.json.tmpl
            encoding = utf8
        [[[json_year]]]
            template = data/year.json.tmpl
            encoding = utf8
        [[[json_lastyear]]]
            template = data/lastyear.json.tmpl
            encoding = utf8
        [[[json_compare]]]
            template = data/compare.json.tmpl
            encoding = utf8

    [[SummaryByMonth]]
        # One NOAA-style text report per month.
        [[[NOAA_month]]]
            encoding = normalized_ascii
            template = NOAA/NOAA-%Y-%m.txt.tmpl

    [[SummaryByYear]]
        # One NOAA-style text report per year.
        [[[NOAA_year]]]
            encoding = normalized_ascii
            template = NOAA/NOAA-%Y.txt.tmpl

# Copy static assets (CSS / JS / vendored libraries) straight to HTML_ROOT.
[CopyGenerator]

    # copy_always so upgrades refresh the assets (copy_once skips existing files).
    copy_always = aganetwx.css, aganetwx.js, favicon.ico, favicon.svg, apple-touch-icon.png
    copy_once = lib/echarts.min.js

# Units and formatting. The unit SYSTEM is not forced here: the skin follows
# whatever you configure, set `unit_system = us | metric | metricwx` in
# [[AganetWXReport]] (installer defaults to metricwx). To pin individual units
# regardless of system, add a [[Groups]] block here, e.g. group_pressure = hPa.
[Units]

    [[StringFormats]]
        degree_C            = %.1f
        degree_compass      = %.0f
        hPa                 = %.1f
        km_per_hour         = %.1f
        km                  = %.1f
        mm                  = %.1f
        mm_per_hour         = %.1f
        percent             = %.0f
        uv_index            = %.0f
        watt_per_meter_squared = %.0f
        NONE                = "--"

    [[Labels]]
        # Suffix labels appended to a value when .format() is used.
        degree_C            = "°C"
        degree_compass      = "°"
        hPa                 = " hPa"
        km_per_hour         = " km/h"
        km                  = " km"
        mm                  = " mm"
        mm_per_hour         = " mm/h"
        percent             = "%"
        watt_per_meter_squared = " W/m²"
        uv_index            = ""
        meter               = " m"

    [[Ordinates]]
        # Compass labels, switched per-language at render time in the template.
        # These English defaults are overridden by [Texts] when lang=el.
        directions = N, NNE, NE, ENE, E, ESE, SE, SSE, S, SSW, SW, WSW, W, WNW, NW, NNW, N/A

    [[TimeFormats]]
        hour        = %H:%M
        day         = %H:%M
        week        = %H:%M on %A
        month       = %d-%b
        year        = %d-%b
        rainyear    = %d-%b
        current     = %d/%m/%Y %H:%M
        ephem_day   = %H:%M
        ephem_year  = %d-%b %H:%M

# English defaults. The active language is set by `lang` and loads
# lang/<code>.conf, which overrides these.
[Labels]
    [[Generic]]
        # Sensor display names (English defaults; translations in lang/*.conf
        # via the [Texts] mechanism when lang=el is set in weewx.conf).
        outTemp            = Temperature
        inTemp             = Inside Temperature
        outHumidity        = Humidity
        inHumidity         = Inside Humidity
        dewpoint           = Dew Point
        windchill          = Wind Chill
        heatindex          = Heat Index
        appTemp            = Apparent Temperature
        barometer          = Barometer
        pressure           = Pressure
        windSpeed          = Wind Speed
        windGust           = Wind Gust
        windDir            = Wind Direction
        rain               = Rain
        rainRate           = Rain Rate
        ET                 = Evapotranspiration
        UV                 = UV Index
        radiation          = Solar Radiation
        cloudbase          = Cloud Base

# Image generation is intentionally off: charts are interactive ECharts fed
# by the JSON templates above. No [ImageGenerator] section needed.

[Generators]
    generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator
