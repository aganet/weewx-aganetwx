# AganetWX English strings. Activated by `lang = en` in [[AganetWXReport]].
# To add a language, copy to lang/<code>.conf and translate the right-hand sides; keys stay English.

[Units]

    [[Labels]]
        # Unit suffixes (kept metric; mirror skin.conf [Units][[Labels]]).
        degree_C            = "°C"
        degree_compass      = "°"
        hPa                 = " hPa"
        km_per_hour         = " km/h"
        km                  = " km"
        mm                  = " mm"
        mm_per_hour         = " mm/h"
        percent             = "%"
        watt_per_meter_squared = " W/m²"
        meter               = " m"

[Labels]

    [[Generic]]
        # Observation display names ($obs.label.outTemp, etc.)
        outTemp            = Temperature
        inTemp             = Inside Temperature
        outHumidity        = Humidity
        dewpoint           = Dew Point
        windchill          = Wind Chill
        heatindex          = Heat Index
        appTemp            = Apparent Temperature
        barometer          = Barometer
        windSpeed          = Wind Speed
        windGust           = Wind Gust
        windDir            = Wind Direction
        rain               = Rain
        rainRate           = Rain Rate
        ET                 = Evapotranspiration
        UV                 = UV Index
        radiation          = Solar Radiation
        cloudbase          = Cloud Base

[Texts]
    Language = English

    # Headings / chrome
    "Weather Station"   = "Observations are powered by a Personal Weather Station"
